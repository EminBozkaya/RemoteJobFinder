name: release-please

# Release-Please: main'e conventional commit (feat:/fix:/...) push edildikçe
# çalışır; bir "Release v0.X.Y" PR'ı açar/günceller. PR merge edilince
# git tag + GitHub release + CHANGELOG güncellemesi kendiliğinden olur.
# Docs: https://github.com/googleapis/release-please-action

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
